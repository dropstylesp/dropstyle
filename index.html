<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DropStyle - En Desarrollo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Fuente elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 60px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 span {
            font-weight: 300;
        }

        .line {
            width: 60px;
            height: 2px;
            background: #fff;
            margin: 20px auto;
            opacity: 0.5;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .status {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #fff;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .status:hover {
            background: #fff;
            color: #000;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DROP<span>STYLE</span></h1>
        <div class="line"></div>
        <p>This website is currently under development. We are working diligently to complete it and will make every effort to launch it as soon as possible. Thank you for your patience and understanding.</p>
        <div class="status">EN DESARROLLO</div>
        <footer>© 2026 DropStyle</footer>
    </div>

</body>
</html>
